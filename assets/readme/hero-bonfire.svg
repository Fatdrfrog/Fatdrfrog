      <feColorMatrix values="0 0 0 0 0.96 0 0 0 0 0.90 0 0 0 0 0.78 0 0 0 0.08 0"/>
    </filter>
  </defs>

  <rect width="1600" height="560" fill="url(#sky)"/>
