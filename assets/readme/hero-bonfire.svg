<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" aria-labelledby="title desc" viewBox="0 0 1600 560">
  <title id="title">Samat Kalshabekov Profile Banner</title>
  <desc id="desc">Dark camp scene with a bonfire glow and profile context for AI support operations.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="58%" stop-color="#17100d"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" x2="0" y1="1" y2="0">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="62%" stop-color="#ff7a18"/>
      <stop offset="100%" stop-color="#f5e6c8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="75%" r="42%">
      <stop offset="0%" stop-color="#ff7a18" stop-opacity=".56"/>
      <stop offset="48%" stop-color="#c2410c" stop-opacity=".26"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" width="140%" height="140%" x="-20%" y="-20%">
